<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playable concept · The Almanac · Pipes</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#f5f1e8;--ink:#26241f;--muted:#8a8478;--green:#2f6b4f;--line:#d9d2c2}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8e3d6;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Space Mono',monospace}
.ad{width:360px;height:640px;background:var(--cream);border:3px solid var(--ink);outline:1px solid var(--ink);outline-offset:-12px;
  display:flex;flex-direction:column;align-items:center;padding:34px 20px;position:relative;overflow:hidden}
.kicker{font-size:11px;letter-spacing:.18em;color:var(--muted);margin-bottom:14px}
h1{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:34px;color:var(--ink);text-align:center;line-height:1.15}
h1 em{font-style:italic;color:var(--green)}
.sub{font-size:12px;color:var(--muted);margin:10px 0 22px;text-align:center}
.board{display:grid;grid-template-columns:repeat(3,86px);grid-template-rows:repeat(3,86px);border:2px solid var(--ink);position:relative}
.tile{border:1px solid var(--line);background:var(--cream);cursor:pointer;transition:transform .08s}
.tile:active{transform:scale(.94)}
.tile svg{width:100%;height:100%;display:block}
.tile path{stroke:var(--muted);stroke-width:14;fill:none;stroke-linecap:round;transition:stroke .25s}
.tile.live path{stroke:var(--green)}
.port{position:absolute;font-size:10px;color:var(--muted);letter-spacing:.1em}
.port.in{left:-6px;top:50%;transform:translate(-100%,-50%)}
.port.out{right:-6px;top:50%;transform:translate(100%,-50%)}
.taps{margin-top:18px;font-size:12px;color:var(--muted)}
.end{position:absolute;inset:0;background:var(--cream);display:flex;flex-direction:column;justify-content:center;align-items:center;
  gap:14px;opacity:0;pointer-events:none;transition:opacity .5s;padding:30px;text-align:center}
.end.show{opacity:1;pointer-events:auto}
.end h2{font-family:'Cormorant Garamond',serif;font-size:44px;color:var(--green)}
.end p{font-size:13px;color:var(--muted);line-height:1.7}
.cta{margin-top:8px;background:var(--ink);color:var(--cream);border:none;padding:14px 34px;font-family:'Space Mono',monospace;
  font-weight:700;font-size:13px;letter-spacing:.08em;cursor:pointer}
.cta:hover{background:var(--green)}
.wordmark{position:absolute;bottom:26px;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:22px;color:var(--ink)}
.note{position:fixed;bottom:10px;left:0;right:0;text-align:center;font-size:11px;color:#8a8478}
</style>
</head>
<body>
<div class="ad">
  <div class="kicker">PLAYABLE AD CONCEPT · P-01</div>
  <h1>connect the water<br>in <em>under 15 seconds?</em></h1>
  <div class="sub">tap a tile to rotate it</div>
  <div class="board" id="board">
    <span class="port in">IN →</span>
    <span class="port out">→ OUT</span>
  </div>
  <div class="taps">taps: <span id="taps">0</span></div>
  <div class="end" id="end">
    <h2>solved.</h2>
    <p>that took you <span id="time"></span> seconds.<br>there's a fresh one every day,<br>and 10 more games like it.</p>
    <button class="cta" onclick="alert('In a real playable this deep-links to the App Store listing.')">PLAY TODAY'S PUZZLE</button>
  </div>
  <div class="wordmark">The Almanac</div>
</div>
<div class="note">Unsolicited concept work by Keelin McLoughlin · not affiliated with Voodoo/Cortex</div>

<script>
// tiles: type S (straight) base connections [N,S]=[0,2]; type C (corner) base [N,E]=[0,1]
// grid solution path: IN(W of r1c0) -> r1c0 C{W,N} -> r0c0 C{S,E} -> r0c1 S{E,W} -> r0c2 C{W,S} -> r1c2 C{N,E} -> OUT(E)
const LAYOUT = [
  ["C","S","C"],
  ["C","S","C"],
  ["C","S","C"]
];
// rotations start scrambled (deterministic scramble that is NOT solved)
let rot = [[2,0,1],[1,3,2],[3,1,0]];
const BASE = {S:[0,2], C:[0,1]};
const OPP = d => (d+2)%4;
const conns = (r,c) => BASE[LAYOUT[r][c]].map(d => (d+rot[r][c])%4);

const board = document.getElementById("board");
const cells = [];
for(let r=0;r<3;r++)for(let c=0;c<3;c++){
  const div = document.createElement("div");
  div.className = "tile";
  div.innerHTML = svgFor(LAYOUT[r][c]);
  div.style.order = r*3+c;
  div.addEventListener("pointerdown", ()=>{
    rot[r][c] = (rot[r][c]+1)%4;
    taps++; document.getElementById("taps").textContent = taps;
    render();
  });
  board.appendChild(div);
  cells.push({div,r,c});
}
let taps = 0, t0 = null, done = false;

function svgFor(t){
  if(t==="S") return `<svg viewBox="0 0 100 100"><path d="M50 0 L50 100"/></svg>`;
  return `<svg viewBox="0 0 100 100"><path d="M50 0 L50 50 L100 50"/></svg>`;
}
function render(){
  if(t0===null) t0 = performance.now();
  cells.forEach(({div,r,c})=>{
    div.querySelector("svg").style.transform = `rotate(${rot[r][c]*90}deg)`;
    div.classList.remove("live");
  });
  // flow BFS from IN (west side of r1c0)
  const live = new Set(); let reachedOut = false;
  const key=(r,c)=>r+","+c;
  const queue=[];
  if(conns(1,0).includes(3)){ queue.push([1,0]); live.add(key(1,0)); }
  const D = [[-1,0],[0,1],[1,0],[0,-1]]; // N,E,S,W
  while(queue.length){
    const [r,c]=queue.shift();
    for(const d of conns(r,c)){
      if(r===1&&c===2&&d===1){ reachedOut=true; continue; }
      const nr=r+D[d][0], nc=c+D[d][1];
      if(nr<0||nr>2||nc<0||nc>2) continue;
      if(live.has(key(nr,nc))) continue;
      if(conns(nr,nc).includes(OPP(d))){ live.add(key(nr,nc)); queue.push([nr,nc]); }
    }
  }
  cells.forEach(({div,r,c})=>{ if(live.has(key(r,c))) div.classList.add("live"); });
  if(reachedOut && !done){
    done = true;
    document.getElementById("time").textContent = ((performance.now()-t0)/1000).toFixed(1);
    setTimeout(()=>document.getElementById("end").classList.add("show"), 600);
  }
}
render();
</script>
</body>
</html>
